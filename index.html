<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>100일 이벤트 💜</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

  font-family:
    system-ui,
    -apple-system,
    "Apple SD Gothic Neo",
    "Noto Sans KR",
    sans-serif;

  background:
    linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
    url("01.jpg");

  background-size:cover;
  background-position:center;

  position:relative;
}

/* 배경 블러 */

.bg-glow{
  position:absolute;
  width:500px;
  height:500px;

  background:
    radial-gradient(circle,
    rgba(192,132,252,.35),
    transparent 70%);

  filter:blur(30px);

  z-index:0;

  animation:glow 6s infinite alternate;
}

@keyframes glow{
  from{
    transform:scale(1) translateY(0);
  }
  to{
    transform:scale(1.2) translateY(-20px);
  }
}

/* 반짝이 */

.sparkle{
  position:fixed;
  width:4px;
  height:4px;
  border-radius:50%;
  background:white;

  animation:twinkle 2s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{
    opacity:.2;
    transform:scale(.6);
  }
  50%{
    opacity:1;
    transform:scale(1.8);
  }
}

/* 메인 카드 */

.card{
  width:100%;
  max-width:420px;

  position:relative;
  z-index:10;

  border-radius:35px;

  overflow:hidden;

  background:
    rgba(255,255,255,.14);

  backdrop-filter:blur(18px);

  border:
    1px solid rgba(255,255,255,.18);

  box-shadow:
    0 20px 50px rgba(0,0,0,.35);

  animation:floatCard 3s ease-in-out infinite;
}

@keyframes floatCard{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-8px);
  }
}

/* 상단 이미지 */

.top-image{
  width:100%;
  height:240px;

  background:
    url("03.jpg");

  background-size:cover;
  background-position:center;

  position:relative;
}

/* 인스타 감성 오버레이 */

.overlay{
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      transparent,
      rgba(0,0,0,.5)
    );
}

/* 상단 아이디 */

.profile{
  position:absolute;
  left:18px;
  bottom:18px;

  display:flex;
  align-items:center;
  gap:10px;

  color:white;
}

.profile-img{
  width:42px;
  height:42px;

  border-radius:50%;

  border:2px solid white;

  background:
    url("04.jpg");

  background-size:cover;
  background-position:center;
}

.profile-name{
  font-size:15px;
  font-weight:700;
}

/* 본문 */

.content{
  padding:28px;
  text-align:center;
}

/* 하트 */

.big-heart{
  font-size:38px;
  margin-bottom:14px;

  animation:heartbeat 1.2s infinite;
}

@keyframes heartbeat{
  0%,100%{
    transform:scale(1);
  }
  30%{
    transform:scale(1.18);
  }
  50%{
    transform:scale(.95);
  }
}

/* 제목 */

.title{
  font-size:30px;
  font-weight:800;

  color:white;

  margin-bottom:18px;
}

/* 메시지 */

.message{
  font-size:19px;
  line-height:1.9;

  color:white;

  opacity:.95;

  margin-bottom:36px;
}

.highlight{
  color:#d8b4fe;
  font-weight:800;
}

/* 버튼 */

.btn-container{
  position:relative;
  width:280px;
  height:60px;
  margin:0 auto;
}

.btn{
  position:absolute;
  top:0;

  width:120px;
  height:52px;

  border:none;
  border-radius:999px;

  font-size:17px;
  font-weight:700;

  cursor:pointer;

  transition:.2s;
}

.btn:active{
  transform:scale(.96);
}

.yes{
  left:0;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #d946ef
    );

  color:white;

  box-shadow:
    0 8px 20px rgba(139,92,246,.4);
}

.no{
  left:160px;

  background:white;
  color:#333;
}

/* 결과 */

.result{
  display:none;

  animation:fadeUp .8s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.result h2{
  color:white;
  font-size:32px;
  margin-bottom:18px;
}

.result p{
  color:white;
  line-height:1.9;
  font-size:18px;
}

/* 하단 */

.footer{
  margin-top:26px;
  color:rgba(255,255,255,.7);
  font-size:13px;
}

/* 하트 애니메이션 */

.heart{
  position:fixed;
  z-index:999;
  pointer-events:none;

  animation:float 4s linear forwards;
}

@keyframes float{
  0%{
    transform:translateY(0) scale(.8);
    opacity:1;
  }
  100%{
    transform:translateY(-700px) scale(1.8);
    opacity:0;
  }
}

/* 컨페티 */

.confetti{
  position:fixed;
  top:-20px;
  z-index:999;

  animation:confettiFall 4s linear forwards;
}

@keyframes confettiFall{
  to{
    transform:
      translateY(110vh)
      rotate(720deg);
  }
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

  <!-- 상단 사진 -->

  <div class="top-image">

    <div class="overlay"></div>

    <div class="profile">

      <div class="profile-img"></div>

      <div class="profile-name">
        with_you_forever 💜
      </div>

    </div>

  </div>

  <!-- 본문 -->

  <div class="content">

    <div class="big-heart">
      💜
    </div>

    <div class="title" id="mainTitle">
      우리의 100일
    </div>

    <div class="message" id="mainMessage">

      너랑 함께한 하루하루가 모여<br>

      벌써 <span class="highlight">100일</span>이 되었어 ☺️<br><br>

      앞으로도 지금처럼<br>
      오래오래 함께해줄래? 💜

    </div>

    <!-- 버튼 -->

    <div class="btn-container">

      <button class="btn yes" id="yesBtn">
        당연하지 💜
      </button>

      <button class="btn no" id="noBtn">
        아니
      </button>

    </div>

    <!-- 결과 -->

    <div class="result" id="result">

      <h2>💜 100일 축하해 💜</h2>

      <p>

        너랑 함께한 모든 순간들이<br>
        정말 소중하고 행복했어 ☺️<br><br>

        앞으로의 시간도<br>
        같이 예쁘게 만들어가자 💜

      </p>

    </div>

    <div class="footer">
      made with love ✨
    </div>

  </div>

</div>

<script>

/* 반짝이 */

for(let i=0;i<45;i++){

  const s=document.createElement("div");

  s.className="sparkle";

  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";

  s.style.animationDelay=Math.random()*2+"s";

  document.body.appendChild(s);
}

/* 버튼 */

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const result=document.getElementById("result");

/* YES */

yesBtn.addEventListener("click",()=>{

  document.body.style.background=
  `
  linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.3)),
  url("02.jpg")
  `;

  document.body.style.backgroundSize="cover";
  document.body.style.backgroundPosition="center";

  /* 기존 숨김 */

  document.getElementById("mainTitle").style.display="none";

  document.getElementById("mainMessage").style.display="none";

  document.querySelector(".btn-container").style.display="none";

  /* 결과 */

  result.style.display="block";

  createHearts();
  createConfetti();

});

/* 하트 */

function createHearts(){

  const hearts=["💜","✨","💟"];

  for(let i=0;i<45;i++){

    const heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML=
      hearts[Math.floor(Math.random()*hearts.length)];

    heart.style.left=
      Math.random()*100+"vw";

    heart.style.top="100vh";

    heart.style.fontSize=
      (20+Math.random()*35)+"px";

    heart.style.animationDuration=
      (3+Math.random()*2)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
      heart.remove();
    },5000);
  }
}

/* 컨페티 */

function createConfetti(){

  const colors=[
    "#8b5cf6",
    "#c084fc",
    "#e9d5ff",
    "#ffffff"
  ];

  for(let i=0;i<120;i++){

    const conf=document.createElement("div");

    conf.className="confetti";

    conf.style.left=
      Math.random()*100+"vw";

    conf.style.background=
      colors[Math.floor(Math.random()*colors.length)];

    conf.style.width=
      (6+Math.random()*8)+"px";

    conf.style.height=
      (6+Math.random()*12)+"px";

    conf.style.animationDuration=
      (2+Math.random()*3)+"s";

    document.body.appendChild(conf);

    setTimeout(()=>{
      conf.remove();
    },5000);
  }
}

/* NO 버튼 도망 */

function moveNo(){

  const container=
    document.querySelector(".btn-container");

  const maxX=
    container.clientWidth-noBtn.offsetWidth;

  const maxY=
    container.clientHeight-noBtn.offsetHeight;

  const x=Math.random()*maxX;
  const y=Math.random()*maxY;

  noBtn.style.left=x+"px";
  noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseenter",moveNo);

noBtn.addEventListener("touchstart",(e)=>{
  e.preventDefault();
  moveNo();
},{passive:false});

noBtn.addEventListener("click",(e)=>{
  e.preventDefault();
  moveNo();
});

</script>

</body>
</html>
